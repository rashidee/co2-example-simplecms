<!-- USA000048 [v1.0.0] -->

<!-- Breadcrumb -->
<div class="px-6 pt-5 pb-2">
  <nav class="flex items-center text-sm text-[#646970]">
    <a href="/editor/home" hx-get="/api/content/editor/home" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/home" class="text-primary hover:text-secondary hover:underline">Home</a>
    <svg class="w-4 h-4 mx-1 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <a href="/editor/features_section" hx-get="/api/content/editor/features_section" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/features_section" class="text-primary hover:text-secondary hover:underline">Features</a>
    <svg class="w-4 h-4 mx-1 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-[#1e1e1e] font-medium">Create Feature</span>
  </nav>
</div>

<!-- Page Content -->
<div class="px-6 pb-6 flex-1">

  <!-- Page Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-[#1e1e1e]">Create Feature</h1>
    <p class="text-sm text-[#646970] mt-1">Add a new feature to display on the marketing page.</p>
  </div>

  <!-- Form -->
  <form class="bg-white border border-[#c3c4c7] rounded-card p-6 max-w-2xl" x-data="{ titleCount: 0, descCount: 0 }">

    <!-- Icon -->
    <div class="mb-5">
      <label for="icon" class="block text-sm font-medium text-[#1e1e1e] mb-1">Icon <span class="text-danger">*</span></label>
      <select id="icon" name="icon" required class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
        <option value="">Select an icon...</option>
        <option value="fa-rocket">fa-rocket - Rocket</option>
        <option value="fa-shield">fa-shield - Shield</option>
        <option value="fa-bolt">fa-bolt - Bolt</option>
        <option value="fa-star">fa-star - Star</option>
        <option value="fa-heart">fa-heart - Heart</option>
        <option value="fa-globe">fa-globe - Globe</option>
        <option value="fa-chart-line">fa-chart-line - Chart Line</option>
        <option value="fa-users">fa-users - Users</option>
        <option value="fa-cog">fa-cog - Cog</option>
        <option value="fa-lock">fa-lock - Lock</option>
      </select>
    </div>

    <!-- Title -->
    <div class="mb-5">
      <label for="title" class="block text-sm font-medium text-[#1e1e1e] mb-1">Title <span class="text-danger">*</span></label>
      <input type="text" id="title" name="title" required maxlength="100" @input="titleCount = $el.value.length" placeholder="Enter feature title" class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] placeholder-[#646970] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
      <p class="text-xs text-[#646970] mt-1"><span x-text="titleCount">0</span>/100 characters</p>
    </div>

    <!-- Description -->
    <div class="mb-5">
      <label for="description" class="block text-sm font-medium text-[#1e1e1e] mb-1">Description <span class="text-danger">*</span></label>
      <textarea id="description" name="description" required maxlength="500" rows="4" @input="descCount = $el.value.length" placeholder="Enter feature description" class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] placeholder-[#646970] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary resize-vertical"></textarea>
      <p class="text-xs text-[#646970] mt-1"><span x-text="descCount">0</span>/500 characters</p>
    </div>

    <!-- Display Order -->
    <div class="mb-5">
      <label for="display_order" class="block text-sm font-medium text-[#1e1e1e] mb-1">Display Order <span class="text-danger">*</span></label>
      <input type="number" id="display_order" name="display_order" required min="1" placeholder="1" class="w-32 px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] placeholder-[#646970] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
    </div>

    <!-- Status -->
    <div class="mb-6">
      <label for="status" class="block text-sm font-medium text-[#1e1e1e] mb-1">Status <span class="text-danger">*</span></label>
      <select id="status" name="status" required class="w-48 px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
        <option value="DRAFT" selected>DRAFT</option>
        <option value="INACTIVE">INACTIVE</option>
        <option value="ACTIVE">ACTIVE</option>
      </select>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3 pt-4 border-t border-[#c3c4c7]">
      <button type="submit" class="inline-flex items-center gap-2 px-5 py-2 bg-primary hover:bg-secondary text-white text-sm font-medium rounded-btn transition-colors duration-200">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Submit
      </button>
      <a href="/editor/features_section" hx-get="/api/content/editor/features_section" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/features_section" class="inline-flex items-center gap-2 px-5 py-2 border border-[#c3c4c7] hover:bg-[#f0f0f1] text-[#1e1e1e] text-sm font-medium rounded-btn transition-colors duration-200">
        Cancel
      </a>
    </div>

  </form>

</div>
