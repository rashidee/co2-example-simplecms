<!-- USA000072 [v1.0.0] -->

<!-- Breadcrumb -->
<div class="px-6 pt-5 pb-2">
  <nav class="flex items-center text-sm text-[#646970]">
    <a href="/editor/home" hx-get="/api/content/editor/home" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/home" class="text-primary hover:text-secondary hover:underline">Home</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <a href="/editor/team_section" hx-get="/api/content/editor/team_section" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/team_section" class="text-primary hover:text-secondary hover:underline">Team</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-[#1e1e1e] font-medium">Add New</span>
  </nav>
</div>

<!-- Page Content -->
<div class="px-6 pb-6 flex-1" x-data="{ form: { name: '', role: '', linkedinUrl: '', displayOrder: '', status: 'DRAFT' }, imageError: '' }">
  <h1 class="text-2xl font-bold text-[#1e1e1e] mb-6">Add New Team Member</h1>

  <div class="bg-white border border-[#c3c4c7] rounded-card p-6 max-w-3xl">
    <form @submit.prevent class="space-y-6">

      <!-- Profile Picture Upload -->
      <div>
        <label class="block text-sm font-medium text-[#1e1e1e] mb-1">Profile Picture <span class="text-[#d63638]">*</span></label>
        <p class="text-xs text-[#646970] mb-2">Accepted dimension: 400 x 400 pixels only.</p>
        <div class="border-2 border-dashed border-[#c3c4c7] rounded-card p-6 text-center hover:border-[#2271b1] transition-colors cursor-pointer" @click="$refs.imageInput.click()">
          <input type="file" x-ref="imageInput" accept="image/png,image/jpeg,image/webp" class="hidden">
          <svg class="w-10 h-10 mx-auto text-[#c3c4c7] mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <p class="text-sm text-[#646970]">Click to upload profile picture</p>
          <p class="text-xs text-[#646970] mt-1">PNG, JPG or WebP (400 x 400px)</p>
        </div>
        <template x-if="imageError">
          <p class="text-xs text-[#d63638] mt-1" x-text="imageError"></p>
        </template>
      </div>

      <!-- Name -->
      <div>
        <label for="name" class="block text-sm font-medium text-[#1e1e1e] mb-1">Name <span class="text-[#d63638]">*</span></label>
        <input type="text" id="name" x-model="form.name" maxlength="100" required class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1]" placeholder="Enter team member name">
        <p class="text-xs text-[#646970] mt-1"><span x-text="form.name.length"></span> / 100 characters</p>
      </div>

      <!-- Role/Position -->
      <div>
        <label for="role" class="block text-sm font-medium text-[#1e1e1e] mb-1">Role / Position <span class="text-[#d63638]">*</span></label>
        <input type="text" id="role" x-model="form.role" maxlength="100" required class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1]" placeholder="Enter role or position">
        <p class="text-xs text-[#646970] mt-1"><span x-text="form.role.length"></span> / 100 characters</p>
      </div>

      <!-- LinkedIn URL -->
      <div>
        <label for="linkedinUrl" class="block text-sm font-medium text-[#1e1e1e] mb-1">LinkedIn URL <span class="text-[#d63638]">*</span></label>
        <input type="url" id="linkedinUrl" x-model="form.linkedinUrl" required class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1]" placeholder="https://linkedin.com/in/username">
        <p class="text-xs text-[#646970] mt-1">Must be a valid URL.</p>
      </div>

      <!-- Display Order & Status -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="displayOrder" class="block text-sm font-medium text-[#1e1e1e] mb-1">Display Order <span class="text-[#d63638]">*</span></label>
          <input type="number" id="displayOrder" x-model.number="form.displayOrder" required min="0" step="1" class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1]" placeholder="0">
          <p class="text-xs text-[#646970] mt-1">Lower numbers display first.</p>
        </div>
        <div>
          <label for="status" class="block text-sm font-medium text-[#1e1e1e] mb-1">Status <span class="text-[#d63638]">*</span></label>
          <select id="status" x-model="form.status" required class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1]">
            <option value="DRAFT">Draft</option>
            <option value="INACTIVE">Inactive</option>
            <option value="ACTIVE">Active</option>
          </select>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-4 border-t border-[#c3c4c7]">
        <button type="submit" class="inline-flex items-center gap-2 bg-[#2271b1] hover:bg-[#135e96] text-white px-5 py-2 rounded-btn text-sm font-medium transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Submit
        </button>
        <a href="/editor/team_section" hx-get="/api/content/editor/team_section" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/team_section" class="inline-flex items-center gap-2 bg-white border border-[#c3c4c7] text-[#646970] hover:text-[#1e1e1e] px-5 py-2 rounded-btn text-sm font-medium transition-colors">Cancel</a>
      </div>
    </form>
  </div>
</div>
