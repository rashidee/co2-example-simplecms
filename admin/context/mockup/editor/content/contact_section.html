<!-- Breadcrumb -->
<div class="px-6 pt-5 pb-2">
  <nav class="flex items-center text-sm text-[#646970]">
    <a href="/editor/home" hx-get="/api/content/editor/home" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/home" class="text-primary hover:text-secondary hover:underline">Home</a>
    <svg class="w-4 h-4 mx-1 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-[#1e1e1e] font-medium">Contact</span>
  </nav>
</div>

<!-- Page Content -->
<div class="px-6 pb-6 flex-1">
  <!-- Page Title -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-[#1e1e1e]">Contact Information</h1>
  </div>

  <!-- CONSA0027 Note -->
  <div class="flex items-start gap-3 mb-6 p-4 bg-blue-50 border border-blue-200 rounded-card">
    <svg class="w-5 h-5 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <p class="text-sm text-[#1e1e1e]">This is a single record — updates overwrite existing data.</p>
  </div>

  <!-- Contact Information Form -->
  <div class="bg-white border border-[#c3c4c7] rounded-card p-6 max-w-2xl">
    <form>
      <!-- Phone Number -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-[#1e1e1e] mb-1">Phone Number <span class="text-danger">*</span></label>
        <input type="tel" value="+1 (555) 123-4567" class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
      </div>

      <!-- Email Address -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-[#1e1e1e] mb-1">Email Address <span class="text-danger">*</span></label>
        <input type="email" value="contact@simplecms.com" class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
      </div>

      <!-- Physical Address -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-[#1e1e1e] mb-1">Physical Address <span class="text-danger">*</span></label>
        <textarea rows="3" maxlength="500" class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary resize-vertical" required>123 Business Avenue, Suite 200
San Francisco, CA 94102
United States</textarea>
        <p class="text-xs text-[#646970] mt-1">Maximum 500 characters</p>
      </div>

      <!-- LinkedIn URL -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-[#1e1e1e] mb-1">LinkedIn URL <span class="text-danger">*</span></label>
        <input type="url" value="https://www.linkedin.com/company/simplecms" class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
      </div>

      <!-- Save Button -->
      <div class="flex">
        <button type="submit" class="inline-flex items-center gap-2 px-5 py-2 bg-primary hover:bg-secondary text-white text-sm font-medium rounded-btn transition-colors duration-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Save
        </button>
      </div>
    </form>
  </div>

  <!-- Contact Messages Section -->
  <div class="mt-8 max-w-2xl">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-[#1e1e1e]">Contact Messages</h2>
    </div>
    <div class="bg-white border border-[#c3c4c7] rounded-card p-6">
      <p class="text-sm text-[#646970] mb-4">View and respond to messages submitted through the contact form on your landing page.</p>
      <a href="/editor/contact_messages" hx-get="/api/content/editor/contact_messages" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/contact_messages" class="inline-flex items-center gap-2 px-4 py-2 bg-primary hover:bg-secondary text-white text-sm font-medium rounded-btn transition-colors duration-200">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        View Messages
      </a>
    </div>
  </div>
</div>
