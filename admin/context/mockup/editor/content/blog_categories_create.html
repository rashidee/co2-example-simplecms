<!-- Breadcrumb -->
<div class="px-6 pt-5 pb-2">
  <nav class="flex items-center text-sm text-[#646970]">
    <a href="/editor/home" hx-get="/api/content/editor/home" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/home" class="text-primary hover:text-secondary hover:underline">Home</a>
    <svg class="w-4 h-4 mx-1 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <a href="/editor/blog_categories" hx-get="/api/content/editor/blog_categories" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/blog_categories" class="text-primary hover:text-secondary hover:underline">Blog Categories</a>
    <svg class="w-4 h-4 mx-1 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-[#1e1e1e] font-medium">Add New</span>
  </nav>
</div>

<!-- Page Content -->
<div class="px-6 pb-6 flex-1">
  <!-- Page Title -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-[#1e1e1e]">Add New Category</h1>
  </div>

  <!-- Create Form -->
  <div class="bg-white border border-[#c3c4c7] rounded-card p-6 max-w-2xl">
    <form>
      <!-- Name -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-[#1e1e1e] mb-1">Name <span class="text-danger">*</span></label>
        <input type="text" maxlength="100" placeholder="Enter category name" class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" required />
        <p class="text-xs text-[#646970] mt-1">Maximum 100 characters</p>
      </div>

      <!-- Description -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-[#1e1e1e] mb-1">Description</label>
        <textarea rows="4" maxlength="500" placeholder="Enter a brief description for this category" class="w-full px-3 py-2 border border-[#c3c4c7] rounded-btn text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary resize-vertical"></textarea>
        <p class="text-xs text-[#646970] mt-1">Maximum 500 characters</p>
      </div>

      <!-- Buttons -->
      <div class="flex items-center gap-3">
        <button type="submit" class="inline-flex items-center gap-2 px-5 py-2 bg-primary hover:bg-secondary text-white text-sm font-medium rounded-btn transition-colors duration-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Submit
        </button>
        <a href="/editor/blog_categories" hx-get="/api/content/editor/blog_categories" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/blog_categories" class="inline-flex items-center gap-2 px-4 py-2 border border-[#c3c4c7] hover:bg-[#f0f0f1] text-[#1e1e1e] text-sm font-medium rounded-btn transition-colors duration-200">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
