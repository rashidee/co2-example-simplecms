<!-- USA000060 [v1.0.0] -->

<!-- Breadcrumb -->
<div class="px-6 pt-5 pb-2">
  <nav class="flex items-center text-sm text-[#646970]">
    <a href="/editor/home" hx-get="/api/content/editor/home" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/home" class="text-primary hover:text-secondary hover:underline">Home</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <a href="/editor/testimonials" hx-get="/api/content/editor/testimonials" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/testimonials" class="text-primary hover:text-secondary hover:underline">Testimonials</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-[#1e1e1e] font-medium">Add New</span>
  </nav>
</div>

<!-- Page Content -->
<div class="px-6 pb-6 flex-1" x-data="{ form: { customerName: '', customerReview: '', rating: '', displayOrder: '', status: 'DRAFT' } }">
  <h1 class="text-2xl font-bold text-[#1e1e1e] mb-6">Add New Testimonial</h1>

  <div class="bg-white border border-[#c3c4c7] rounded-card p-6 max-w-3xl">
    <form @submit.prevent class="space-y-6">

      <!-- Customer Name -->
      <div>
        <label for="customerName" class="block text-sm font-medium text-[#1e1e1e] mb-1">Customer Name <span class="text-[#d63638]">*</span></label>
        <input type="text" id="customerName" x-model="form.customerName" maxlength="100" required class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1]" placeholder="Enter customer name">
        <p class="text-xs text-[#646970] mt-1"><span x-text="form.customerName.length"></span> / 100 characters</p>
      </div>

      <!-- Customer Review -->
      <div>
        <label for="customerReview" class="block text-sm font-medium text-[#1e1e1e] mb-1">Customer Review <span class="text-[#d63638]">*</span></label>
        <textarea id="customerReview" x-model="form.customerReview" maxlength="1000" required rows="5" class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1] resize-none" placeholder="Enter customer review"></textarea>
        <p class="text-xs text-[#646970] mt-1"><span x-text="form.customerReview.length"></span> / 1000 characters</p>
      </div>

      <!-- Rating & Display Order -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="rating" class="block text-sm font-medium text-[#1e1e1e] mb-1">Rating <span class="text-[#d63638]">*</span></label>
          <select id="rating" x-model="form.rating" required class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1]">
            <option value="" disabled>Select rating</option>
            <option value="1">1 Star</option>
            <option value="2">2 Stars</option>
            <option value="3">3 Stars</option>
            <option value="4">4 Stars</option>
            <option value="5">5 Stars</option>
          </select>
        </div>
        <div>
          <label for="displayOrder" class="block text-sm font-medium text-[#1e1e1e] mb-1">Display Order <span class="text-[#d63638]">*</span></label>
          <input type="number" id="displayOrder" x-model.number="form.displayOrder" required min="0" step="1" class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1]" placeholder="0">
          <p class="text-xs text-[#646970] mt-1">Lower numbers display first.</p>
        </div>
      </div>

      <!-- Status -->
      <div>
        <label for="status" class="block text-sm font-medium text-[#1e1e1e] mb-1">Status <span class="text-[#d63638]">*</span></label>
        <select id="status" x-model="form.status" required class="w-full border border-[#c3c4c7] rounded-btn px-3 py-2 text-sm text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-[#2271b1] focus:border-[#2271b1] max-w-xs">
          <option value="DRAFT">Draft</option>
          <option value="INACTIVE">Inactive</option>
          <option value="ACTIVE">Active</option>
        </select>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-4 border-t border-[#c3c4c7]">
        <button type="submit" class="inline-flex items-center gap-2 bg-[#2271b1] hover:bg-[#135e96] text-white px-5 py-2 rounded-btn text-sm font-medium transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Submit
        </button>
        <a href="/editor/testimonials" hx-get="/api/content/editor/testimonials" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/editor/testimonials" class="inline-flex items-center gap-2 bg-white border border-[#c3c4c7] text-[#646970] hover:text-[#1e1e1e] px-5 py-2 rounded-btn text-sm font-medium transition-colors">Cancel</a>
      </div>
    </form>
  </div>
</div>
