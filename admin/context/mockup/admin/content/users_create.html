<!-- USA000021 [v1.0.0] -->
<div class="p-6 space-y-6">

  <!-- Breadcrumb -->
  <nav class="flex items-center text-sm text-[#646970]">
    <a href="/admin/home" hx-get="/api/content/admin/home" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/admin/home" class="hover:text-primary transition-colors">Home</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <a href="/admin/users" hx-get="/api/content/admin/users" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/admin/users" class="hover:text-primary transition-colors">Users</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-[#1e1e1e] font-medium">Add New User</span>
  </nav>

  <!-- Page Header -->
  <h1 class="text-2xl font-bold text-[#1e1e1e]">Add New User</h1>

  <!-- Form Card -->
  <div class="bg-white rounded-card border border-[#c3c4c7] p-6 max-w-2xl">
    <form @submit.prevent="console.log('Create user submitted')" class="space-y-5">

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          Email <span class="text-[#d63638]">*</span>
        </label>
        <input type="email" id="email" name="email" required placeholder="user@example.com" class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] placeholder-[#646970] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
      </div>

      <!-- First Name -->
      <div>
        <label for="firstName" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          First Name <span class="text-[#d63638]">*</span>
        </label>
        <input type="text" id="firstName" name="firstName" required placeholder="Enter first name" class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] placeholder-[#646970] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
      </div>

      <!-- Last Name -->
      <div>
        <label for="lastName" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          Last Name <span class="text-[#d63638]">*</span>
        </label>
        <input type="text" id="lastName" name="lastName" required placeholder="Enter last name" class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] placeholder-[#646970] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
      </div>

      <!-- Role -->
      <div>
        <label for="role" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          Role <span class="text-[#d63638]">*</span>
        </label>
        <select id="role" name="role" required class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="">Select a role</option>
          <option value="USER">User</option>
          <option value="EDITOR">Editor</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>

      <!-- Status -->
      <div>
        <label for="status" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          Status <span class="text-[#d63638]">*</span>
        </label>
        <select id="status" name="status" required class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="ACTIVE">Active</option>
          <option value="INACTIVE">Inactive</option>
        </select>
      </div>

      <!-- Password Note -->
      <div class="flex items-start gap-2 p-3 bg-blue-50 border border-blue-200 rounded-btn">
        <svg class="w-5 h-5 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <p class="text-sm text-[#1e1e1e]">Default password will be set to <strong>'password'</strong>. User will be prompted to change on first login.</p>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-2">
        <button type="submit" class="inline-flex items-center gap-2 px-5 py-2 bg-primary hover:bg-secondary text-white text-sm font-medium rounded-btn transition-colors duration-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Submit
        </button>
        <a href="/admin/users" hx-get="/api/content/admin/users" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/admin/users" class="inline-flex items-center gap-2 px-5 py-2 bg-white hover:bg-[#f0f0f1] text-[#1e1e1e] text-sm font-medium border border-[#c3c4c7] rounded-btn transition-colors duration-200">
          Cancel
        </a>
      </div>

    </form>
  </div>

</div>
