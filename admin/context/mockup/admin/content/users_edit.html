<!-- USA000024 [v1.0.0] -->
<div class="p-6 space-y-6" x-data="editUserPage()">

  <!-- Breadcrumb -->
  <nav class="flex items-center text-sm text-[#646970]">
    <a href="/admin/home" hx-get="/api/content/admin/home" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/admin/home" class="hover:text-primary transition-colors">Home</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <a href="/admin/users" hx-get="/api/content/admin/users" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/admin/users" class="hover:text-primary transition-colors">Users</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-[#1e1e1e] font-medium">Edit User</span>
  </nav>

  <!-- Page Header -->
  <h1 class="text-2xl font-bold text-[#1e1e1e]">Edit User</h1>

  <!-- Form Card -->
  <div class="bg-white rounded-card border border-[#c3c4c7] p-6 max-w-2xl">
    <form @submit.prevent="console.log('Update user submitted')" class="space-y-5">

      <!-- Email (readonly) -->
      <div>
        <label for="email" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          Email <span class="text-[#d63638]">*</span>
        </label>
        <input type="email" id="email" name="email" value="sarah.johnson@example.com" readonly class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#646970] bg-[#f0f0f1] cursor-not-allowed focus:outline-none">
        <p class="mt-1 text-xs text-[#646970]">Email address cannot be changed.</p>
      </div>

      <!-- First Name -->
      <div>
        <label for="firstName" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          First Name <span class="text-[#d63638]">*</span>
        </label>
        <input type="text" id="firstName" name="firstName" required value="Sarah" class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] placeholder-[#646970] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
      </div>

      <!-- Last Name -->
      <div>
        <label for="lastName" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          Last Name <span class="text-[#d63638]">*</span>
        </label>
        <input type="text" id="lastName" name="lastName" required value="Johnson" class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] placeholder-[#646970] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
      </div>

      <!-- Role -->
      <div>
        <label for="role" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          Role <span class="text-[#d63638]">*</span>
        </label>
        <select id="role" name="role" required class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="USER">User</option>
          <option value="EDITOR">Editor</option>
          <option value="ADMIN" selected>Admin</option>
        </select>
      </div>

      <!-- Status -->
      <div>
        <label for="status" class="block text-sm font-medium text-[#1e1e1e] mb-1">
          Status <span class="text-[#d63638]">*</span>
        </label>
        <select id="status" name="status" required class="w-full px-3 py-2 text-sm border border-[#c3c4c7] rounded-btn text-[#1e1e1e] focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="ACTIVE" selected>Active</option>
          <option value="INACTIVE">Inactive</option>
        </select>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-2">
        <button type="submit" class="inline-flex items-center gap-2 px-5 py-2 bg-primary hover:bg-secondary text-white text-sm font-medium rounded-btn transition-colors duration-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Save
        </button>
        <a href="/admin/users" hx-get="/api/content/admin/users" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/admin/users" class="inline-flex items-center gap-2 px-5 py-2 bg-white hover:bg-[#f0f0f1] text-[#1e1e1e] text-sm font-medium border border-[#c3c4c7] rounded-btn transition-colors duration-200">
          Cancel
        </a>
      </div>

    </form>
  </div>

  <!-- Danger Zone -->
  <div class="bg-white rounded-card border border-[#d63638]/30 p-6 max-w-2xl">
    <h2 class="text-lg font-semibold text-[#d63638] mb-2">Danger Zone</h2>
    <p class="text-sm text-[#646970] mb-4">Once you delete a user, there is no going back. Please be certain.</p>
    <button @click="confirmDelete()" class="inline-flex items-center gap-2 px-5 py-2 bg-[#d63638] hover:bg-red-700 text-white text-sm font-medium rounded-btn transition-colors duration-200">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      Delete This User
    </button>
  </div>

</div>

<script>
  function editUserPage() {
    return {
      confirmDelete() {
        if (confirm('Are you sure you want to delete user "Sarah Johnson"? This action cannot be undone.')) {
          console.log('Deleting user: Sarah Johnson');
        }
      }
    }
  }
</script>
