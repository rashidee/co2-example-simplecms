<!DOCTYPE html>
<html lang="en" x-data="appShell()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal — Simple CMS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2271b1',
            secondary: '#135e96',
            accent: '#2271b1',
            success: '#00a32a',
            warning: '#dba617',
            danger: '#d63638',
            sidebar: '#1d2327',
          },
          fontFamily: {
            body: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Oxygen-Sans', 'Ubuntu', 'Cantarell', '"Helvetica Neue"', 'sans-serif'],
          },
          borderRadius: {
            'btn': '4px',
            'card': '8px',
          }
        }
      }
    }

    function appShell() {
      return {
        darkMode: localStorage.getItem('darkMode') === 'true',
        toggleDark() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('darkMode', this.darkMode);
        }
      }
    }
  </script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .htmx-request #content-spinner { display: flex; }
    .htmx-request.htmx-request #content-area { opacity: 0.4; }
  </style>
</head>
<body class="bg-[#f0f0f1] dark:bg-slate-900 text-[#1e1e1e] dark:text-slate-200 min-h-screen flex flex-col">

  {{HEADER}}

  <div class="flex pt-16 min-h-[calc(100vh-4rem)]">
    {{SIDEBAR}}
    <main class="flex-1 ml-64 flex flex-col min-w-0">
      <div id="content-spinner" class="hidden fixed inset-0 bg-white/50 z-50 items-center justify-center">
        <div class="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
      </div>
      <div id="content-area" class="flex-1 flex flex-col transition-opacity duration-200">
        {{CONTENT}}
      </div>
      {{FOOTER}}
    </main>
  </div>

</body>
</html>
