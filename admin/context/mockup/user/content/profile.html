<!-- USA000012 [v1.0.0] -->

<!-- Breadcrumb -->
<div class="px-6 pt-5 pb-2">
  <nav class="flex items-center text-sm text-[#646970]">
    <a href="/user/home" hx-get="/api/content/user/home" hx-target="#content-area" hx-swap="innerHTML" hx-push-url="/user/home" class="text-primary hover:text-secondary hover:underline">Home</a>
    <svg class="w-4 h-4 mx-2 text-[#c3c4c7]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="text-[#1e1e1e] font-medium">Profile</span>
  </nav>
</div>

<!-- Page Content -->
<div class="px-6 pb-6 flex-1">
  <div class="bg-white border border-[#c3c4c7] rounded-card max-w-2xl">
    <!-- Profile Header -->
    <div class="p-6 border-b border-[#c3c4c7]">
      <div class="flex items-center gap-5">
        <div class="w-20 h-20 rounded-full bg-primary flex items-center justify-center text-white text-2xl font-bold shrink-0">
          JS
        </div>
        <div class="flex-1">
          <h1 class="text-xl font-bold text-[#1e1e1e]">John Smith</h1>
          <p class="text-[#646970] text-sm mt-0.5">john@simplecms.com</p>
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-[#f0f0f1] text-[#646970] mt-2">User</span>
        </div>
      </div>
    </div>

    <!-- Profile Details -->
    <!-- CONSA0003: Only first name and last name can be edited -->
    <div class="p-6 space-y-5">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-[#646970] mb-1">First Name</label>
          <p class="text-[#1e1e1e] text-sm font-medium bg-[#f0f0f1] rounded-btn px-3 py-2.5 border border-[#c3c4c7]">John</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#646970] mb-1">Last Name</label>
          <p class="text-[#1e1e1e] text-sm font-medium bg-[#f0f0f1] rounded-btn px-3 py-2.5 border border-[#c3c4c7]">Smith</p>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#646970] mb-1">Email Address</label>
        <p class="text-[#1e1e1e] text-sm bg-[#f0f0f1] rounded-btn px-3 py-2.5 border border-[#c3c4c7] flex items-center gap-2">
          <svg class="w-4 h-4 text-[#646970]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          john@simplecms.com
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#646970] mb-1">Role</label>
        <p class="text-[#1e1e1e] text-sm bg-[#f0f0f1] rounded-btn px-3 py-2.5 border border-[#c3c4c7]">User</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#646970] mb-1">Status</label>
        <p class="flex items-center gap-2">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-[#00a32a]/10 text-[#00a32a]">
            <span class="w-1.5 h-1.5 rounded-full bg-[#00a32a] mr-1.5"></span>
            Active
          </span>
        </p>
      </div>
    </div>

    <!-- Actions -->
    <div class="px-6 py-4 border-t border-[#c3c4c7] bg-[#f0f0f1]/50 rounded-b-card">
      <button type="button" class="inline-flex items-center gap-2 px-4 py-2 bg-primary hover:bg-secondary text-white text-sm font-medium rounded-btn transition-colors duration-200">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        Edit Profile
      </button>
      <p class="text-xs text-[#646970] mt-2">Only first name and last name can be updated.</p>
    </div>
  </div>
</div>
