<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple CMS Landing Page - Mockup Sitemap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f0f1;
      color: #1e1e1e;
      padding: 40px 20px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #2271b1; }
    .subtitle { font-size: 14px; color: #646970; margin-bottom: 32px; }
    .card {
      background: #ffffff;
      border: 1px solid #c3c4c7;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-title { font-size: 16px; font-weight: 600; }
    .card-url { font-size: 13px; color: #646970; margin-top: 2px; }
    .card a {
      display: inline-block;
      background: #2271b1;
      color: #fff;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }
    .card a:hover { background: #135e96; }
    footer { text-align: center; margin-top: 40px; font-size: 13px; color: #646970; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Landing Page (Simple CMS)</h1>
    <p class="subtitle">Application: Landing Page (Simple CMS) &mdash; v1.0.0 &mdash; 3 screens</p>

    <div class="card">
      <div>
        <div class="card-title">Landing Page</div>
        <div class="card-url">http://localhost:3000/</div>
      </div>
      <a href="http://localhost:3000/" target="_blank" rel="noopener">Open</a>
    </div>

    <div class="card">
      <div>
        <div class="card-title">Blog Directory</div>
        <div class="card-url">http://localhost:3000/blog</div>
      </div>
      <a href="http://localhost:3000/blog" target="_blank" rel="noopener">Open</a>
    </div>

    <div class="card">
      <div>
        <div class="card-title">Blog Detail</div>
        <div class="card-url">http://localhost:3000/blog/sample-blog-post</div>
      </div>
      <a href="http://localhost:3000/blog/sample-blog-post" target="_blank" rel="noopener">Open</a>
    </div>

    <footer>&copy; 2026 Simple CMS. Mockup sitemap.</footer>
  </div>
</body>
</html>
